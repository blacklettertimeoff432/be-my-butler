name: ShellCheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: koalaman/shellcheck-action@v1
        with:
          scandir: .
        env:
          SHELLCHECK_OPTS: "-e SC1091"
